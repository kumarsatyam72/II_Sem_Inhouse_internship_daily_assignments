<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-secondary">
    <div class="container py-5">
        <h2 class="text-center mb-4">Students Records</h2>
        <input type="text" id="search" class="form-control mb-3" placeholder="Search Students">
        <div id="container" class="row g-4"></div>
        <DIV ID="json" class="row g-4">
        </div></DIV>

  </body>
  <script>
     const students = [
          {name: "pranay", branch: "CSE", cgpa: 8.9},
          {name: "parth", branch: "CSE", cgpa: 8.7},
          {name: "Prashant", branch: "CSE", cgpa: 8.5},
          {name: "Naitik", branch: "CSE", cgpa: 8.0},
          {name: "ekansh", branch: "CSE" , cgpa: 8.1},
          {name: "aman", branch: "CSE", cgpa: 9.5},
          {name: "bharat", branch: "CSE", cgpa: 9.0},
          {name: "happy", branch: "CSE", cgpa: 9.5},
          {name: "darshika", branch: "CSE", cgpa: 8.5},
          {name: "milan", branch: "CSE", cgpa: 8.5},
          
     ]
  
     let html = "";
     for(let i=0 ; i<students.length ; i++){
        html += `
         <div class="col-md-4 card-item">
            <div class="card shadow">
                <div class="card-body">
                    <h4>${students[i].name}</h4>
                    <button class="btn btn-primary btn-sm mt-2">Show Details</button>

                    <div class="details mt-3" style="display: none;">
                        <p><strong>Branch:</strong> ${students[i].branch}</p>
                        <p><strong>CGPA:</strong> ${students[i].cgpa}</p>
                </div>
            </div>
        </div>
        </div>
        `;
     }
     document.getElementById("container").innerHTML = html;
     // show details
     document.querySelectorAll(".btn-primary").forEach(button => {
        button.addEventListener("click", function(){
            const details = button.nextElementSibling;
            details.style.display = details.style.display === "block" ? "none" : "block";
        });
     });

     
  </script>
</html>
